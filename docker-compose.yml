name: monitoring-stack

services:
  # Automated Bucket Creation for MinIO
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    domainname: minio
    env_file: .env
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - monitoring

  minio-setup:
    image: minio/mc
    container_name: minio-setup
    restart: on-failure
    network_mode: "service:minio"
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://127.0.0.1:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD) do echo '...waiting for minio' && sleep 1; done;
      for bucket in $$(echo $$MINIO_BUCKETS | tr ',' ' '); do
        /usr/bin/mc mb --ignore-existing local/$$bucket;
      done;
      exit 0;
      "

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    hostname: loki
    domainname: loki
    restart: always
    command:
      - "-config.file=/etc/loki/config.yaml"
      - "-config.expand-env=true"
    env_file: .env
    volumes:
      - ./configs/loki-config.yaml:/etc/loki/config.yaml
      - loki-data:/loki
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - monitoring

  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    hostname: prometheus
    domainname: mimir
    restart: always
    command: 
      - "-config.file=/etc/mimir/mimir.yaml"
      - "-config.expand-env=true"
      # Enable the alertmanager and ruler
      - "-target=all,alertmanager,ruler" 
    env_file: .env
    volumes:
      - ./configs/mimir-config.yaml:/etc/mimir/mimir.yaml
      - ./configs/alertmanager.yaml:/etc/mimir/alertmanager.yaml
      - ./configs/mimir-rules.yaml:/etc/mimir/rules/anonymous/rules.yaml
      - mimir-data:/data
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
    networks:
      - monitoring

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    hostname: tempo
    domainname: tempo
    restart: always
    env_file: .env
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
      - "-config.expand-env=true"
    volumes:
      - ./configs/tempo-config.yaml:/etc/tempo/tempo.yaml
      - tempo-data:/var/tempo
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - monitoring

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    hostname: alloy
    domainname: alloy
    restart: always
    volumes:
      - ./configs/alloy-config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock
    command: run --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    hostname: grafana
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      # Provisioning Configuration
      - ./configs/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./configs/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      # Dashboard JSON files
      - ./configs/dashboards:/etc/grafana/provisioning/dashboards/json
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
    name: monitoring
    external: true      

volumes:
  minio-data:
  loki-data:
  mimir-data:
  tempo-data:
  grafana-data: